<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Scheduler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">Task Scheduler</h2>

    <div class="mb-3">
        <label for="taskName" class="form-label">Task Name</label>
        <input type="text" id="taskName" class="form-control" placeholder="Enter task name">
    </div>

    <div class="mb-3">
        <label for="startTime" class="form-label">Start Time</label>
        <input type="time" id="startTime" class="form-control">
    </div>

    <div class="mb-3">
        <label for="timeTaken" class="form-label">Time Taken</label>
        <select id="timeTaken" class="form-select">
            <option value="">Select Time Taken</option>
            <option value="00:30">00:30</option>
            <option value="01:00">01:00</option>
            <option value="01:30">01:30</option>
            <option value="02:00">02:00</option>
        </select>
    </div>

    <button id="addTask" class="btn btn-primary mb-3">Add Task</button>
    <button id="copyTasks" class="btn btn-success mb-3">Copy All Tasks</button>

    <h4 class="mt-5">Scheduled Tasks</h4>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>No</th>
                <th>Start Time</th>
                <th>End Time</th>
                <th>Total Hours</th>
                <th>Task Name</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="taskList">
            <!-- Task rows will be inserted here dynamically -->
        </tbody>
    </table>
</div>

<script>
$(document).ready(function() {
    let taskList = [];

    function calculateEndTime(startTime, duration) {
        const [hours, minutes] = startTime.split(":").map(Number);
        const [dHours, dMinutes] = duration.split(":").map(Number);

        let endMinutes = minutes + dMinutes;
        let endHours = hours + dHours + Math.floor(endMinutes / 60);
        endMinutes = endMinutes % 60;

        if (endHours >= 24) endHours = endHours % 24;

        return `${endHours.toString().padStart(2, "0")}:${endMinutes.toString().padStart(2, "0")}`;
    }

    function calculateTotalHours(duration) {
        const [dHours, dMinutes] = duration.split(":").map(Number);
        return (dHours + dMinutes / 60).toFixed(2);
    }

    function updateTaskDisplay() {
        $('#taskList').empty();
        taskList.forEach((task, index) => {
            const taskData = task.split(" ");
            const taskRow = `
                <tr>
                    <td>${index + 1}</td>
                    <td>${taskData[0]}</td>
                    <td>${taskData[1]}</td>
                    <td>${taskData[2]}</td>
                    <td>${taskData.slice(3).join(" ")}</td>
                    <td>
                        <button class="btn btn-danger btn-sm removeTask" data-index="${index}">Remove</button>
                    </td>
                </tr>
            `;
            $('#taskList').append(taskRow);
        });
    }

    $('#addTask').click(function() {
        const taskName = $('#taskName').val().trim();
        const startTime = $('#startTime').val();
        const timeTaken = $('#timeTaken').val();

        if (taskName && startTime && timeTaken) {
            const endTime = calculateEndTime(startTime, timeTaken);
            const totalHours = calculateTotalHours(timeTaken);
            const taskText = `${startTime} ${endTime} ${totalHours} ${taskName}`;
            taskList.push(taskText);
            updateTaskDisplay();

            $('#taskName').val('');
            $('#startTime').val('');
            $('#timeTaken').val('');
        } else {
            alert('Please fill out all fields.');
        }
    });

    $(document).on('click', '.removeTask', function() {
        const index = $(this).data('index');
        taskList.splice(index, 1);
        updateTaskDisplay();
    });

    $('#copyTasks').click(function() {
        if (taskList.length === 0) {
            alert('No tasks to copy.');
            return;
        }

        const taskText = taskList.map((task, index) => {
            const taskData = task.split(" ");
            return `${taskData[0]}\t${taskData[1]}\t${taskData[2]}\t${taskData.slice(3).join(' ')}`;
        }).join('\n');
        
        const fullText = taskText;
        
        navigator.clipboard.writeText(fullText)
            .then(() => {
                alert('All tasks copied to clipboard!');
            })
            .catch(() => {
                alert('Failed to copy tasks.');
            });
    });
});
</script>
</body>
</html>
